<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ 2026 Dünya Kupası Tahmin Ligi</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --secondary: #f59e0b;
      --danger: #ef4444;
      --dark-bg: #0f172a;
      --dark-card: #1e293b;
      --dark-border: #334155;
      --dark-text: #f1f5f9;
      --dark-muted: #94a3b8;
      --light-green: #d1fae5;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--dark-bg);
      color: var(--dark-text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--dark-bg);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }

    /* BUTTON STYLES */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }

    .btn-secondary {
      background: var(--secondary);
      color: white;
    }

    .btn-secondary:hover {
      background: #d97706;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    /* LOGIN SCREEN */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 20px;
    }

    .login-container {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .login-logo {
      text-align: center;
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .login-title {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--primary);
    }

    .login-subtitle {
      text-align: center;
      color: var(--dark-muted);
      margin-bottom: 30px;
      font-size: 0.9rem;
    }

    .login-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--dark-border);
    }

    .login-tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      color: var(--dark-muted);
      cursor: pointer;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .login-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--dark-text);
    }

    .form-input {
      width: 100%;
      padding: 12px;
      background: var(--dark-bg);
      border: 1px solid var(--dark-border);
      border-radius: 8px;
      color: var(--dark-text);
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    .form-content {
      display: none;
    }

    .form-content.active {
      display: block;
    }

    .login-error {
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 10px;
      text-align: center;
    }

    .login-success {
      color: var(--primary);
      font-size: 0.85rem;
      margin-top: 10px;
      text-align: center;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-logo {
      font-size: 2.5rem;
    }

    .header-info h1 {
      font-size: 1.5rem;
      margin-bottom: 2px;
    }

    .header-info p {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-badge {
      background: rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .btn-logout {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    /* MAIN CONTAINER */
    #main-app {
      display: none;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--dark-border);
      overflow-x: auto;
    }

    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      color: var(--dark-muted);
      cursor: pointer;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* CARD */
    .card {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 15px;
      color: var(--primary);
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: var(--dark-bg);
      border: 1px solid var(--dark-border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 0.9rem;
      color: var(--dark-muted);
      margin-top: 8px;
    }

    /* LEADERBOARD */
    .leaderboard-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: var(--dark-bg);
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid var(--dark-border);
    }

    .rank-badge {
      font-size: 1.5rem;
      font-weight: 700;
      min-width: 50px;
      text-align: center;
    }

    .player-info {
      flex: 1;
    }

    .player-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .player-stats {
      font-size: 0.85rem;
      color: var(--dark-muted);
    }

    .player-score {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* MATCH CARD */
    .match-day {
      margin-bottom: 30px;
    }

    .match-day-header {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--primary);
    }

    .match-card {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
    }

    .match-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .match-info {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--dark-muted);
    }

    .group-badge {
      background: var(--primary);
      color: white;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .match-status {
      font-size: 0.85rem;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .status-upcoming {
      background: rgba(59, 130, 246, 0.2);
      color: #3b82f6;
    }

    .status-live {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .status-finished {
      background: rgba(16, 185, 129, 0.2);
      color: var(--primary);
    }

    .match-teams {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      align-items: center;
      margin-bottom: 20px;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    .team-flag {
      font-size: 2rem;
    }

    .team-name {
      text-align: center;
    }

    .vs {
      text-align: center;
      color: var(--dark-muted);
    }

    .score-display {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      background: var(--dark-bg);
      padding: 15px;
      border-radius: 8px;
    }

    /* PREDICTION INPUT */
    .pred-section {
      background: var(--dark-bg);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .pred-label {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--primary);
    }

    .pred-inputs {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 15px;
    }

    .score-input {
      width: 60px;
      padding: 10px;
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 6px;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark-text);
    }

    .score-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .score-dash {
      font-size: 1.5rem;
      color: var(--dark-muted);
    }

    /* PREDICTIONS LIST */
    .predictions-list {
      background: var(--dark-bg);
      padding: 15px;
      border-radius: 8px;
    }

    .predictions-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--dark-muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .prediction-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--dark-border);
    }

    .prediction-row:last-child {
      border-bottom: none;
    }

    .pred-player {
      font-weight: 500;
    }

    .pred-score {
      font-weight: 700;
      color: var(--primary);
      margin: 0 10px;
    }

    .pred-points {
      font-size: 0.85rem;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    .points-3 {
      background: rgba(16, 185, 129, 0.2);
      color: var(--primary);
    }

    .points-1 {
      background: rgba(245, 158, 11, 0.2);
      color: var(--secondary);
    }

    .points-0 {
      background: rgba(107, 114, 128, 0.2);
      color: var(--dark-muted);
    }

    /* ACCORDION */
    .accordion-item {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 12px;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      cursor: pointer;
      background: var(--dark-bg);
      border-bottom: 1px solid var(--dark-border);
      transition: all 0.3s;
    }

    .accordion-header:hover {
      background: var(--dark-card);
    }

    .accordion-title {
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .accordion-icon {
      transition: transform 0.3s;
      color: var(--primary);
    }

    .accordion-header.active .accordion-icon {
      transform: rotate(180deg);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .accordion-content.active {
      max-height: 1000px;
    }

    .accordion-body {
      padding: 20px;
    }

    /* MATCH RESULTS */
    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }

    .result-card {
      background: var(--dark-bg);
      border: 1px solid var(--dark-border);
      border-radius: 10px;
      padding: 15px;
    }

    .result-teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 10px;
    }

    .result-team {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
    }

    .result-score {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* FLOATING MESSAGE */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--primary);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
      animation: slideIn 0.3s ease;
      z-index: 1000;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--dark-muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }

      .header-left {
        justify-content: center;
      }

      .header-user {
        justify-content: center;
      }

      .match-teams {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .team {
        justify-content: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .tabs {
        gap: 5px;
      }

      .tab-btn {
        padding: 10px 15px;
        font-size: 0.85rem;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--dark-muted);
    }

    .spinner {
      border: 3px solid var(--dark-border);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-container">
      <div class="login-logo">⚽</div>
      <div class="login-title">Tahmin Ligi 2026</div>
      <div class="login-subtitle">Dünya Kupası Tahmin Oyunu</div>

      <div class="login-tabs">
        <button class="login-tab active" onclick="switchTab(event, 'login-form')">Giriş</button>
        <button class="login-tab" onclick="switchTab(event, 'register-form')">Kayıt</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="login-form" class="form-content active">
        <div class="form-group">
          <label class="form-label">Oyuncu Adı</label>
          <input type="text" id="login-name" class="form-input" placeholder="Adınızı girin">
        </div>
        <div class="form-group">
          <label class="form-label">Şifre</label>
          <input type="password" id="login-pass" class="form-input" placeholder="Şifrenizi girin">
        </div>
        <button class="btn btn-primary" onclick="playerLogin()" style="width: 100%;">Giriş Yap</button>
        <div id="login-error" class="login-error"></div>
      </div>

      <!-- REGISTER FORM -->
      <div id="register-form" class="form-content">
        <div class="form-group">
          <label class="form-label">Oyuncu Adı</label>
          <input type="text" id="register-name" class="form-input" placeholder="Adınız soyadınız">
        </div>
        <div class="form-group">
          <label class="form-label">Şifre</label>
          <input type="password" id="register-pass" class="form-input" placeholder="Min. 6 karakter">
        </div>
        <div class="form-group">
          <label class="form-label">Şifreyi Onayla</label>
          <input type="password" id="register-pass2" class="form-input" placeholder="Şifrenizi tekrar girin">
        </div>
        <button class="btn btn-primary" onclick="registerPlayer()" style="width: 100%;">Kayıt Ol</button>
        <div id="register-error" class="login-error"></div>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="main-app">
    <div class="header">
      <div class="header-left">
        <div class="header-logo">⚽</div>
        <div class="header-info">
          <h1>Tahmin Ligi 2026</h1>
          <p>Dünya Kupası Tahmin Oyunu</p>
        </div>
      </div>
      <div class="header-user">
        <div class="user-badge">👤 <span id="current-user"></span></div>
        <button class="btn-logout" onclick="logout()">Çıkış Yap</button>
      </div>
    </div>

    <div class="container">
      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchMainTab(event, 'tab-leaderboard')">🏆 Sıralama</button>
        <button class="tab-btn" onclick="switchMainTab(event, 'tab-matches')">📅 Maçlar</button>
        <button class="tab-btn" onclick="switchMainTab(event, 'tab-results')">📊 Sonuçlar</button>
      </div>

      <!-- TAB: LEADERBOARD -->
      <div id="tab-leaderboard" class="tab-content active">
        <div class="card">
          <div class="card-title">📊 Oyuncu Istatistikleri</div>
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-value" id="stat-players">0</div>
              <div class="stat-label">Toplam Oyuncu</div>
            </div>
            <div class="stat-box">
              <div class="stat-value" id="stat-predictions">0</div>
              <div class="stat-label">Tahmin Yapıldı</div>
            </div>
            <div class="stat-box">
              <div class="stat-value" id="stat-matches">0</div>
              <div class="stat-label">Maç Oynandı</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">🏅 Puan Sıralaması</div>
          <div id="leaderboard-list"></div>
        </div>
      </div>

      <!-- TAB: MATCHES -->
      <div id="tab-matches" class="tab-content">
        <div id="matches-container"></div>
      </div>

      <!-- TAB: RESULTS -->
      <div id="tab-results" class="tab-content">
        <div class="card">
          <div class="card-title">⚽ Maç Sonuçları</div>
          <div id="results-list" class="result-grid"></div>
        </div>

        <!-- ACCORDION: Tüm Maç Sonuçları -->
        <div class="accordion-item">
          <div class="accordion-header" onclick="toggleAccordion(this)">
            <div class="accordion-title">
              📋 Tüm Maç Sonuçları
            </div>
            <span class="accordion-icon">▼</span>
          </div>
          <div class="accordion-content">
            <div class="accordion-body">
              <div id="all-results" class="result-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

    // ==================== AUTH FUNCTIONS ====================
    function switchTab(e, form) {
      document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
      document.querySelectorAll('.login-tab').forEach(b => b.classList.remove('active'));
      document.getElementById(form).classList.add('active');
      e.target.classList.add('active');
    }

    function registerPlayer() {
      const name = document.getElementById('register-name').value.trim();
      const pass = document.getElementById('register-pass').value;
      const pass2 = document.getElementById('register-pass2').value;

      if (!name || !pass || !pass2) {
        document.getElementById('register-error').textContent = 'Tüm alanları doldurun';
        return;
      }
      if (pass.length < 6) {
        document.getElementById('register-error').textContent = 'Şifre en az 6 karakter olmalı';
        return;
      }
      if (pass !== pass2) {
        document.getElementById('register-error').textContent = 'Şifreler uyuşmuyor';
        return;
      }

      const uid = Math.random().toString(36).slice(2);
      database.ref('users/' + uid).set({
        name: name,
        pass: pass
      }).then(() => {
        document.getElementById('register-error').textContent = '✅ Kayıt başarılı! Lütfen giriş yapın.';
        setTimeout(() => {
          document.getElementById('register-name').value = '';
          document.getElementById('register-pass').value = '';
          document.getElementById('register-pass2').value = '';
          document.getElementById('register-error').textContent = '';
          switchTab({target: document.querySelector('.login-tab')}, 'login-form');
        }, 1500);
      }).catch(err => {
        document.getElementById('register-error').textContent = '❌ Hata: ' + err.message;
      });
    }

    function playerLogin() {
      const name = document.getElementById('login-name').value.trim();
      const pass = document.getElementById('login-pass').value;

      if (!name || !pass) {
        document.getElementById('login-error').textContent = 'Adı ve şifreyi girin';
        return;
      }

      database.ref('users').orderByChild('name').equalTo(name).once('value', snapshot => {
        if (!snapshot.exists()) {
          document.getElementById('login-error').textContent = 'Oyuncu bulunamadı';
          return;
        }

        let found = false;
        snapshot.forEach(child => {
          if (child.val().pass === pass) {
            currentUser = {
              id: child.key,
              name: name
            };
            found = true;
          }
        });

        if (!found) {
          document.getElementById('login-error').textContent = 'Şifre yanlış';
          return;
        }

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        document.getElementById('current-user').textContent = currentUser.name;
        
        loadData();
      }).catch(err => {
        document.getElementById('login-error').textContent = '❌ Hata: ' + err.message;
      });
    }

    function logout() {
      currentUser = null;
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('main-app').style.display = 'none';
      document.getElementById('login-name').value = '';
      document.getElementById('login-pass').value = '';
    }

    // ==================== DATA FUNCTIONS ====================
    function loadData() {
      // Listen to players
      database.ref('users').on('value', snapshot => {
        appData.players = {};
        snapshot.forEach(child => {
          appData.players[child.key] = {
            id: child.key,
            name: child.val().name
          };
        });
        updateUI();
      });

      // Listen to predictions
      database.ref('predictions').on('value', snapshot => {
        appData.predictions = {};
        snapshot.forEach(child => {
          appData.predictions[child.key] = child.val();
        });
        updateUI();
      });

      // Listen to results
      database.ref('results').on('value', snapshot => {
        appData.results = {};
        snapshot.forEach(child => {
          appData.results[child.key] = child.val();
        });
        updateUI();
      });
    }

    function savePrediction(matchId) {
      const homeEl = document.getElementById('home-' + matchId);
      const awayEl = document.getElementById('away-' + matchId);
      
      if (!homeEl || !awayEl) return;

      const home = parseInt(homeEl.value) || 0;
      const away = parseInt(awayEl.value) || 0;

      database.ref('predictions/' + currentUser.id + '/' + matchId).set({
        home: home,
        away: away
      }).then(() => {
        showToast('✅ Tahmin kaydedildi!');
      }).catch(err => {
        showToast('❌ Hata: ' + err.message);
      });
    }

    function saveResult(matchId) {
      const homeEl = document.getElementById('result-home-' + matchId);
      const awayEl = document.getElementById('result-away-' + matchId);
      
      if (!homeEl || !awayEl) return;

      const home = parseInt(homeEl.value) || 0;
      const away = parseInt(awayEl.value) || 0;

      database.ref('results/' + matchId).set({
        home: home,
        away: away
      }).then(() => {
        showToast('✅ Sonuç kaydedildi!');
      }).catch(err => {
        showToast('❌ Hata: ' + err.message);
      });
    }

    // ==================== CALCULATION ====================
    function calcPoints(userId, matchId) {
      const pred = appData.predictions[userId] && appData.predictions[userId][matchId];
      const res = appData.results[matchId];

      if (!pred || !res) return 0;

      if (pred.home === res.home && pred.away === res.away) return 3;
      if ((pred.home > pred.away) === (res.home > res.away)) return 1;
      if (pred.home === pred.away && res.home === res.away) return 1;
      return 0;
    }

    function getUserPoints(userId) {
      let pts = 0;
      MATCHES.forEach(m => {
        pts += calcPoints(userId, m.id);
      });
      return pts;
    }

    // ==================== UI FUNCTIONS ====================
    function updateUI() {
      updateLeaderboard();
      updateMatches();
      updateResults();
      updateStats();
    }

    function updateStats() {
      document.getElementById('stat-players').textContent = Object.keys(appData.players).length;
      
      let predictions = 0;
      Object.values(appData.predictions).forEach(p => {
        predictions += Object.keys(p || {}).length;
      });
      document.getElementById('stat-predictions').textContent = predictions;
      
      document.getElementById('stat-matches').textContent = Object.keys(appData.results).length;
    }

    function updateLeaderboard() {
      const users = Object.keys(appData.players);
      const sorted = users.map(uid => ({
        id: uid,
        name: appData.players[uid].name,
        pts: getUserPoints(uid)
      })).sort((a, b) => b.pts - a.pts);

      let html = '';
      sorted.forEach((u, i) => {
        const medal = ['🥇', '🥈', '🥉'][i] || (i + 1);
        html += '<div class="leaderboard-item">' +
          '<div class="rank-badge">' + medal + '</div>' +
          '<div class="player-info">' +
          '<div class="player-name">' + u.name + (currentUser && u.id === currentUser.id ? ' (Siz)' : '') + '</div>' +
          '</div>' +
          '<div class="player-score">' + u.pts + '</div>' +
          '</div>';
      });

      document.getElementById('leaderboard-list').innerHTML = html || '<div class="empty-state"><div class="empty-state-icon">👥</div>Henüz oyuncu yok</div>';
    }

    function updateMatches() {
      const dates = [...new Set(MATCHES.map(m => m.d))].sort();
      let html = '';

      dates.forEach(date => {
        const matches = MATCHES.filter(m => m.d === date);
        html += '<div class="match-day">' +
          '<div class="match-day-header">📅 ' + date + '</div>';

        matches.forEach(m => {
          const res = appData.results[m.id];
          const pred = appData.predictions[currentUser.id] && appData.predictions[currentUser.id][m.id];
          const pts = calcPoints(currentUser.id, m.id);

          let statusClass = 'status-upcoming';
          let statusText = '📅 Yaklaşıyor';
          if (res) {
            statusClass = 'status-finished';
            statusText = '✓ Tamamlandı';
          }

          let predHtml = '';
          if (!res) {
            predHtml = '<button class="btn btn-secondary" onclick="savePrediction(\'' + m.id + '\')">💾 Kaydet</button>';
          } else {
            predHtml = '<div style="color: var(--primary); font-weight: 600;">' + (pred ? (pts === 3 ? '🎯' : pts === 1 ? '+1' : '❌') + ' ' + pts + ' Puan' : 'Tahmin yok') + '</div>';
          }

          html += '<div class="match-card">' +
            '<div class="match-header">' +
            '<div class="match-info">' +
            '<span class="group-badge">Grup ' + m.g + '</span>' +
            '<span>⏰ ' + m.t + '</span>' +
            '</div>' +
            '<span class="match-status ' + statusClass + '">' + statusText + '</span>' +
            '</div>' +
            '<div class="match-teams">' +
            '<div class="team"><span class="team-flag">' + (TEAM_FLAGS[m.h] || '') + '</span><span>' + m.h + '</span></div>' +
            '<div class="vs">' + (res ? '<div class="score-display">' + res.home + '-' + res.away + '</div>' : 'vs') + '</div>' +
            '<div class="team"><span>' + m.a + '</span><span class="team-flag">' + (TEAM_FLAGS[m.a] || '') + '</span></div>' +
            '</div>' +
            '<div class="pred-section">' +
            '<div class="pred-label">✍️ Tahmin</div>' +
            '<div class="pred-inputs">' +
            '<input type="number" id="home-' + m.id + '" class="score-input" min="0" max="10" value="' + (pred?.home || 0) + '" ' + (res ? 'disabled' : '') + '>' +
            '<span class="score-dash">-</span>' +
            '<input type="number" id="away-' + m.id + '" class="score-input" min="0" max="10" value="' + (pred?.away || 0) + '" ' + (res ? 'disabled' : '') + '>' +
            '</div>' +
            predHtml +
            '</div>';

          // All predictions
          if (Object.keys(appData.predictions).length > 0) {
            html += '<div class="predictions-list">' +
              '<div class="predictions-title">Tüm Tahminler</div>';
            Object.keys(appData.predictions).forEach(uid => {
              const p = appData.predictions[uid][m.id];
              if (!p) return;
              const pt = calcPoints(uid, m.id);
              const ptClass = ['points-0', 'points-1', 'points-1', 'points-3'][pt];
              html += '<div class="prediction-row">' +
                '<span class="pred-player">' + (appData.players[uid]?.name || 'Bilinmiyor') + '</span>' +
                '<span class="pred-score">' + p.home + '-' + p.away + '</span>' +
                '<span class="pred-points ' + ptClass + '">' + pt + ' pts</span>' +
                '</div>';
            });
            html += '</div>';
          }

          html += '</div>';
        });

        html += '</div>';
      });

      document.getElementById('matches-container').innerHTML = html;
    }

    function updateResults() {
      const results = MATCHES.filter(m => appData.results[m.id]).map(m => ({
        ...m,

        }
      });

      document.getElementById('all-results').innerHTML = allHtml || '<div class="empty-state">Maç sonucu girin</div>';
    }

    function switchMainTab(e, tab) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      e.target.classList.add('active');
    }

    function toggleAccordion(el) {
      const content = el.nextElementSibling;
      el.classList.toggle('active');
      content.classList.toggle('active');
    }

    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
  </script>
</body>
</html>
